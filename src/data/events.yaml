# Hosted events (historical record — events took place while at London Business School).
- title: Tax Bootcamp 2024
  date: 19 June 2024
  location: London Business School (Sussex Place), London
  description: Co-hosted with Rebecca Lester (Stanford GSB). Brought together leading policymakers, practitioners, and scholars on two increasingly important trends — AI for businesses' tax functions and tax policy for sustainability. The Wheeler Institute for Business and Development prepared a three-part blog series with key insights.
  links:
    - label: "Blog: Tax Strategies and the Technological Revolution — Accounting for AI"
      url: https://wheelerblog.london.edu/tax-strategies-and-the-technological-revolution-accounting-for-ai/
    - label: "Blog: Taxes for Climate Action Across the World"
      url: https://wheelerblog.london.edu/taxes-for-climate-action-across-the-world/
    - label: "Blog: New Research on Taxes and Transparency Regulation for Sustainability"
      url: https://wheelerblog.london.edu/research-on-taxes-and-sustainability/
    - label: Agenda (PDF)
      url: https://1drv.ms/b/s!AmXfoDT8duk8jcFtiDj5SxszLJv0Zw?e=abMh25

- title: LBS–Stanford Global Tax Conference 2023
  date: 13–14 June 2023
  location: London Business School (Sussex Place), London
  description: Co-hosted with Rebecca Lester (Stanford GSB). Two days with leading policymakers, practitioners, and scholars on pressing global tax issues, with a keynote by Alenka Turnsek (EY) on the world's more than 3,000 environmental taxes. Speakers included Achim Pross (OECD), Timothy Power (HM Treasury), Pat Brown (PwC), Christoph Spengel (Mannheim), Michael Devereux (Oxford), and Raffaele Russo (Chiomenti). Academic sessions covered tax and public finance in developing countries, carbon leakage, emission taxes and air pollution, and wealth taxation and migration of the very wealthy, plus a PhD poster session.
  links:
    - label: Event summary (LBS News)
      url: https://www.london.edu/news/green-taxes-designed-to-drive-action-2237
