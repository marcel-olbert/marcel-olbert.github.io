- title: COBRA Summer School on Empirical Tax Research
  date: July 2026
  location: Mannheim
  description: An intensive COBRA program for PhD students and early-career scholars on empirical tax research — lectures on frontier research, research pitches, and feedback sessions, with tax systems as empirical settings. Fully booked.
  links:
    - label: COBRA events page
      url: https://www.mannheim-business-school.com/de/the-mannheim-experience/faculty-research/cobra-mannheim-center-for-corporate-behavior-and-regulation-analysis/cobra-events/

- title: COBRA Soft Launch
  date: 9 June 2026
  location: Mannheim
  description: Public launch of COBRA — the Mannheim Center for Corporate Behavior and Regulation Analysis, which I founded and lead as Academic Director. COBRA is a platform for rigorous, data-driven research on regulation, taxation, financial markets, corporate decision-making, and public policy, connecting academic research with policy and business practice.
  links:
    - label: COBRA
      url: https://www.mannheim-business-school.com/de/the-mannheim-experience/faculty-research/cobra-mannheim-center-for-corporate-behavior-and-regulation-analysis/
  photos:
    - /assets/events/cobra-launch-1.jpg
    - /assets/events/cobra-launch-2.jpg

- title: AI & Code Clinic for Research and Teaching
  date: 20 & 26 May 2026
  location: Mannheim
  description: COBRA workshops for faculty and researchers on how AI agents such as Claude Code can support the research process — practical applications, common pitfalls, and new data infrastructure for research. Sessions by Philipp Doerrenberg, Marcel Olbert, and Paul Seidel; slides and recordings available via the COBRA events page.
  links:
    - label: COBRA events page (slides & recordings)
      url: https://www.mannheim-business-school.com/de/the-mannheim-experience/faculty-research/cobra-mannheim-center-for-corporate-behavior-and-regulation-analysis/cobra-events/

# Historical record — events below took place while at London Business School.
- title: Tax Bootcamp 2024
  date: 19 June 2024
  location: London Business School (Sussex Place), London
  description: Co-hosted with Rebecca Lester (Stanford GSB). Brought together leading policymakers, practitioners, and scholars on two increasingly important trends — AI for businesses' tax functions and tax policy for sustainability. The Wheeler Institute for Business and Development prepared a three-part blog series with key insights.
  links:
    - label: "Blog: Tax Strategies and the Technological Revolution — Accounting for AI"
      url: https://wheelerblog.london.edu/tax-strategies-and-the-technological-revolution-accounting-for-ai/
    - label: "Blog: Taxes for Climate Action Across the World"
      url: https://wheelerblog.london.edu/taxes-for-climate-action-across-the-world/
    - label: "Blog: New Research on Taxes and Transparency Regulation for Sustainability"
      url: https://wheelerblog.london.edu/research-on-taxes-and-sustainability/
    - label: Agenda (PDF)
      url: https://1drv.ms/b/s!AmXfoDT8duk8jcFtiDj5SxszLJv0Zw?e=abMh25

- title: LBS–Stanford Global Tax Conference 2023
  date: 13–14 June 2023
  location: London Business School (Sussex Place), London
  description: Co-hosted with Rebecca Lester (Stanford GSB). Two days with leading policymakers, practitioners, and scholars on pressing global tax issues, with a keynote by Alenka Turnsek (EY) on the world's more than 3,000 environmental taxes. Speakers included Achim Pross (OECD), Timothy Power (HM Treasury), Pat Brown (PwC), Christoph Spengel (Mannheim), Michael Devereux (Oxford), and Raffaele Russo (Chiomenti). Academic sessions covered tax and public finance in developing countries, carbon leakage, emission taxes and air pollution, and wealth taxation and migration of the very wealthy, plus a PhD poster session.
  links:
    - label: Event summary (LBS News)
      url: https://www.london.edu/news/green-taxes-designed-to-drive-action-2237
  photos:
    - /assets/events/gtc-2023-1.jpg
    - /assets/events/gtc-2023-2.jpg
    - /assets/events/gtc-2023-3.jpg
