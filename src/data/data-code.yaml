# Data & code resources for researchers.
# `featured: true` → rendered as a highlighted card at the top of the page.
- title: Measuring Tax Effects — An Interactive Measurement Guide for Tax Research
  featured: true
  description: >-
    An open, interactive companion to my Journal of Accounting and Economics review with
    Rebecca Lester (Stanford GSB). It catalogues 84+ measurement approaches, organised by
    research outcome — investment, R&D, M&A, employment, and geographic allocation — each
    with its pros, cons, and data sources; plus 51 datasets documented across eight
    categories, with access requirements, coverage, strengths, and limitations, and a
    glossary of 40+ terms. Built to improve measurement consistency and make data sources
    easier to find for researchers working on the real effects of taxation.
  link: https://www.measuringtaxeffects.com/
  linkLabel: measuringtaxeffects.com
  additional:
    - label: Paper (JAE 2025, open access)
      url: https://doi.org/10.1016/j.jacceco.2025.101837

- title: Financial Reporting Transparency Measures from Orbis Firm-level Data
  description: Code to generate variants of the transparency measure used in Kim & Olbert (2022, JAE). Aggregated measures by industry, country, and year are available from the authors via email. Please cite Kim & Olbert (2022), "How Does Private Firm Disclosure Affect Demand for Public Firm Equity?".
  link: https://1drv.ms/u/s!AmXfoDT8duk8jPVDK0VDoTRZAbMxmg?e=BTOdpj
  linkLabel: Code (OneDrive)
  additional:
    - label: Readme
      url: https://1drv.ms/b/s!AmXfoDT8duk8jPVCUp6adp3kKR9Kqg?e=Dca1m7
    - label: Paper (JAE 2022)
      url: https://www.sciencedirect.com/science/article/pii/S0165410122000684

- title: ESG Disclosures of Private Equity Firms, 2000–2022
  description: Abraham, Olbert & Vasvari (2024, JAR) construct a panel of ESG disclosures from PE firms' historical websites for a global sample of PE firms covered in Preqin. See Section 3 and the Online Appendix of the paper for construction details. Contact the authors to request the dataset (valid Preqin license required).
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4265171
  linkLabel: Paper (SSRN)
  additional:
    - label: Readme
      url: https://1drv.ms/t/s!AmXfoDT8duk8jZRVrozlLJLbnyiT2A?e=d3QISO

- title: TRI, OSHA, Trucost & RepRisk Facilities Matched to Preqin PE Transactions
  description: Abraham, Olbert & Vasvari (2024, JAR) match facilities reporting to the EPA Toxic Release Inventory and OSHA, and companies covered in S&P Trucost and RepRisk, to private equity investments from Preqin. Full dataset available from the authors (Preqin license required); abbreviated datasets without PE firm identifiers available for researchers without a license.
  link: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4265171
  linkLabel: Paper (SSRN)
  additional:
    - label: Readme
      url: https://1drv.ms/w/s!AmXfoDT8duk8jZRXuZcPqrsXkvzkag?e=So4Pw6
    - label: Abbreviated datasets
      url: https://1drv.ms/u/s!AmXfoDT8duk8jZRiB5p6JHGOVaUHug?e=Zz4b5Y

